# Render blueprint for the Atlas Service Desk orchestrator.
# Deploys in demo mode immediately; flips to LIVE once the sync:false values below
# are set in the Render dashboard. Add this service to whichever Render project
# you want to host it in.
#
# Every value below is sync:false (prompted in the dashboard, never committed) --
# this includes tenant identifiers (Okta domain, agent ids, auth server issuer,
# resource audience) that aren't secrets by themselves but are specific to one
# Okta tenant, not secrets in the credential sense, but not something to bake into
# a public template either. See docs/OKTA_SETUP.md for what each one is and how
# to obtain it for your own tenant.
services:
  - type: web
    name: atlas-orchestrator
    runtime: python
    rootDir: apps/orchestrator
    plan: starter            # always-on, no cold starts (for live customer demos)
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: JIRA_PROJECT_KEY
        value: ITSD
      - key: AUTO_RESOLVE_RATE
        value: "0.5"                     # fraction of cases the agents auto-resolve
      - key: A2A_SCOPE
        value: agent.invoke
      # ---- tenant-specific (your Okta domain + agent identities) ----
      - key: OKTA_DOMAIN
        sync: false
      - key: INTAKE_AGENT_ID
        sync: false
      - key: DEVOPS_AGENT_ID
        sync: false
      - key: A2A_CAS_ISSUER
        sync: false
      - key: A2A_AUDIENCE
        sync: false
      - key: TRIAGE_CAS_ID
        sync: false
      - key: TRIAGE_RESOURCE_URL
        sync: false
      - key: FULFILLMENT_CAS_ISSUER
        sync: false
      - key: FULFILLMENT_RESOURCE
        sync: false
      - key: JIRA_ASSIGNEE_EMAIL
        sync: false
      # ---- secrets: set these in the Render dashboard (sync:false = never committed) ----
      # A2A chain bootstrap (client_credentials that mints the first token):
      - key: INTAKE_SERVICE_CLIENT_ID
        sync: false
      - key: INTAKE_SERVICE_SECRET
        sync: false
      # agent private keys (paste the JSON of each .private.jwk.json):
      - key: INTAKE_PRIVATE_JWK
        sync: false
      - key: DEVOPS_PRIVATE_JWK
        sync: false
      # Jira (real writes + resolve + assign):
      - key: JIRA_BASE_URL
        sync: false
      - key: ATLASSIAN_EMAIL
        sync: false
      - key: ATLASSIAN_API_TOKEN
        sync: false
      - key: JIRA_SECRET_RESOURCE_ORN
        sync: false
      # Claude (triage + resolution drafting):
      - key: ANTHROPIC_API_KEY
        sync: false
